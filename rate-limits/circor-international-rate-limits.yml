specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: CIRCOR International
providerId: circor-international
created: '2026-04-19'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy
  - Flow Control
  - Industrial
  - Rate Limiting
description: CIRCOR International does not operate a public developer API and therefore does not
  publish a rate-limit policy. The api.circor.com / developer.circor.com base URLs referenced in
  apis.yml are placeholders. Any future B2B or partner integration would be governed by an
  industrial sales / OEM agreement rather than a public per-second cap.
notes: CIRCOR has no public developer portal or API. There are no public rate limits to record.
sources:
  - https://www.circor.com/
responseCodes:
  unauthorized: 401
  forbidden: 403
  notFound: 404
  serverError: 500
limits:
  - name: Public CIRCOR API
    scope: n/a
    metric: varies
    limit: 'no public API documented'
    notes: Endpoints referenced in apis.yml are placeholders pending future publication.
policies:
  - name: No Public API
    description: CIRCOR does not currently expose a public developer API. Partners requiring data
      integration should contact CIRCOR sales for an OEM / B2B agreement.
