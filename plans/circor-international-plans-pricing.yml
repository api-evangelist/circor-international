description: CIRCOR International is a Fortune 1000 industrial manufacturer of flow-control products
  (pumps, valves) for aerospace, defense, and industrial markets. CIRCOR does not publish a public
  developer API or developer portal — there is no listed API pricing. Commercial relationships flow
  through CIRCOR's industrial sales channels, distributors, and OEM agreements, where pricing is
  negotiated per product (configuration, materials, certification class, lead time) rather than
  per API call.
notes: CIRCOR does not operate a public developer API. The api.circor.com / developer.circor.com
  endpoints referenced in apis.yml are placeholders. No public pricing exists.
sources:
  - https://www.circor.com/
