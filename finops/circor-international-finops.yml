description: 'FOCUS-aligned FinOps for CIRCOR International: industrial-goods commercial shape —
  product purchase orders, aftermarket parts, and service contracts. CIRCOR does not bill for API
  access and does not expose a metered usage surface. This artifact records the commercial cost
  shape that a buyer would see, not an API cost surface.'
notes: CIRCOR does not currently expose any API billing surface. The FinOps shape below describes
  the industrial-product commercial relationship.
sources:
  - https://www.circor.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: CIRCOR International, Inc.
serviceCategory: Industrial / Flow Control
billingModel:
  pricingCategory: Industrial Goods (Quote-to-Cash)
  billingFrequency: Per Purchase Order
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: CIRCOR International
  ServiceCategory: Industrial / Flow Control
  ProviderName: CIRCOR International
  PublisherName: CIRCOR International, Inc.
  InvoiceIssuerName: CIRCOR International, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Industrial Goods
meters:
  - name: product_purchase
    description: Industrial pumps, valves, and aerospace / defense flow-control products purchased
    unit: unit
    aggregation: sum
    dimensions:
      - business_group
      - product_family
      - region
  - name: aftermarket_parts
    description: Spare parts and consumables purchased post-installation
    unit: unit
    aggregation: sum
    dimensions:
      - product_family
      - asset_id
  - name: service_contract
    description: Field service, maintenance, or extended warranty contracts
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - region
principles:
  - name: Visibility
    description: Track CIRCOR spend through purchase orders, asset / equipment registers, and
      service-contract invoices.
  - name: Allocation
    description: Allocate flow-control assets to the operating site, plant, or platform that owns
      them so industrial maintenance can be charged back accurately.
  - name: Optimization
    description: Standardize on common product families to simplify spares inventory; align service
      contracts with planned outage cycles; retire end-of-life assets before excessive aftermarket
      cost accrues.
  - name: Accountability
    description: Operations / engineering owns the asset; procurement owns vendor terms; finance
      reconciles purchase orders, parts spend, and service invoices.
maintainers:
